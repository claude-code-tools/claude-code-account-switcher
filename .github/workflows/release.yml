name: release

# Cross-compile the claude-accounts binary for every supported platform and
# attach the archives to the GitHub Release for the pushed tag. The code is pure
# Go (no cgo), so a single Linux runner builds all targets.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p build dist
          targets="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            bin="claude-accounts"
            [ "$os" = "windows" ] && bin="claude-accounts.exe"
            echo "building $target"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "build/$bin" ./cmd/claude-accounts
            name="claude-accounts_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              (cd build && zip -q "../dist/${name}.zip" "$bin")
            else
              tar -C build -czf "dist/${name}.tar.gz" "$bin"
            fi
            rm -f "build/$bin"
          done
          (cd dist && shasum -a 256 * > checksums.txt)
          ls -l dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
